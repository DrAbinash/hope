      tags: [opd]
      summary: List OPD visits
      parameters:
        - name: patientId
          in: query
          schema:
            type: integer
        - name: doctorId
          in: query
          schema:
            type: integer
        - name: date
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OPD visits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpdVisitListResponse"
    post:
      operationId: createOpdVisit
      tags: [opd]
      summary: Create OPD visit (register patient visit)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpdVisitBody"
      responses:
        "201":
          description: Created OPD visit
          content:

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: IPD admission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IpdAdmission"
    put:
      operationId: updateIpdAdmission
      tags: [ipd]
      summary: Update IPD admission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIpdAdmissionBody"
      responses:
        "200":
          description: Updated IPD admission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IpdAdmission"

  /ipd/{id}/discharge:
    post:
      operationId: dischargePatient
      tags: [ipd]
      summary: Discharge IPD patient (auto-generate discharge summary)
      parameters:

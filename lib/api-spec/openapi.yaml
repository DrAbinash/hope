      operationId: createInvoice
      tags: [billing]
      summary: Create hospital invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceBody"
      responses:
        "201":
          description: Created invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /billing/invoices/{id}:
    get:
      operationId: getInvoice
      tags: [billing]
      summary: Get invoice by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
    put:
      operationId: updateInvoice
      tags: [billing]
      summary: Update invoice (record payment)
      parameters:
        - name: id
          in: path
          required: true

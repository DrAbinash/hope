      parameters:
        - name: patientId
          in: query
          schema:
            type: integer
        - name: doctorId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: wardId
          in: query
          schema:
            type: integer
        - name: page
          in: query
